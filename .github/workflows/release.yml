name: Release

on:
    push:
        branches:
            - main

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
            id-token: write
            attestations: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Test
              run: bun test

            - name: Build
              run: bun run build

            - name: Publish
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: bunx semantic-release

            - name: Attest release assets
              uses: actions/attest@v4
              with:
                  subject-path: |
                      main.js
                      manifest.json
                      styles.css
